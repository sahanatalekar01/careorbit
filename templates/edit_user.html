<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User - CareOrbit</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 40px; }
        .form-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .cancel-link { text-decoration: none; color: #6c757d; padding: 10px 20px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Edit User Access</h2>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" value="{{ user.username }}" required>
        </div>
        
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" value="{{ user.email }}" required>
        </div>
        
        <div class="form-group">
            <label>Privilege Role</label>
            <select name="role">
                <option value="Admin" {% if user.role == 'Admin' %}selected{% endif %}>Admin</option>
                <option value="Doctor" {% if user.role == 'Doctor' %}selected{% endif %}>Doctor</option>
                <option value="Pharmacist" {% if user.role == 'Pharmacist' %}selected{% endif %}>Pharmacist</option>
                <option value="Patient" {% if user.role == 'Patient' %}selected{% endif %}>Patient</option>
            </select>
        </div>
        
        <div class="btn-group">
            <button type="submit">Save Changes</button>
            <a href="{{ url_for('user_management') }}" class="cancel-link">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
