<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Forgot Password - CareOrbit</title>

    <!-- Google Font (Same as Login Page) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
<style>
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}


body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f9ff;
}


/* Main Card */

.forgot-container {

    width: 380px;

    background: white;

    padding: 35px;

    border-radius: 15px;

    text-align: center;

    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.15);

}



/* CareOrbit Logo */

.forgot-container h2 {

    color: #007bff;

    font-size: 32px;

    font-weight: 700;

    margin-bottom: 15px;

}


.forgot-container h2 span {

    color: #00b894;

}



.forgot-container h3 {

    color: #333;

    margin-bottom: 10px;

    font-size: 22px;

}



.forgot-container p {

    color: #777;

    font-size: 14px;

    margin-bottom: 25px;

}



/* Input */

.input-box input {

    width: 100%;

    height: 45px;

    padding: 10px 15px;

    border: 1px solid #ccc;

    border-radius: 8px;

    outline: none;

    font-size: 14px;

}



.input-box input:focus {

    border-color: #007bff;

}



/* Button */

button {

    width: 100%;

    height: 45px;

    margin-top: 20px;

    border: none;

    border-radius: 8px;

    background: #007bff;

    color: white;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

}



button:hover {

    background: #0056b3;

}



/* Back Login */

.back-section {

    margin-top: 20px;

}


.back-section a {

    text-decoration: none;

    color: #007bff;

    font-size: 14px;

    font-weight: 600;

}


.back-section a:hover {

    color: #0056b3;

}
</style>
</head>

<body>

    <div class="forgot-container">

        <!-- Logo / Title -->
        <h2>Care<span>Orbit</span></h2>

        <h3>Forgot Password?</h3>

        <p>
            Enter your registered email address to reset your password.
        </p>
        <form method="POST" action="/forgot-password">

    <div class="input-box">
        <input 
            type="text"
            name="contact"
            placeholder="Enter your Email or Phone Number"
            required>
    </div>

    <button type="submit">
        Submit
    </button>

</form>
</div>

        <div class="back-section">

            <a href="/doctor-login">
                <i class="fa-solid fa-arrow-left"></i>
                Back to Login
            </a>

        </div>


    </div>


    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/your-kit-id.js" crossorigin="anonymous"></script>

</body>

</html>
