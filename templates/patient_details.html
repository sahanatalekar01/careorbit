<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Examination - CareOrbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f6;
        }
        .detail-card {
            border: none;
            border-radius: 15px;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <!-- Back Button -->
        <div class="mb-4">
            <a href="/doctor-dashboard" class="btn btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>

        <div class="card shadow-sm detail-card p-4">
            <div class="row">
                <!-- Left Column: Patient Profile Summary -->
                <div class="col-md-4 border-end">
                    <div class="text-center py-3">
                        <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                            <i class="fa-solid fa-user-md fa-2x"></i>
                        </div>
                        <h4>{{ patient.patient_name }}</h4>
                        <span class="badge bg-secondary p-2 mb-3">ID: #PT-{{ patient.id }}</span>
                    </div>
                    <hr>
                    <div class="p-2">
                        <p><strong><i class="fa-solid fa-venus-mars me-2 text-muted"></i>Gender:</strong> {{ patient.gender }}</p>
                        <p><strong><i class="fa-solid fa-calendar me-2 text-muted"></i>Age:</strong> {{ patient.age }} yrs</p>
                        <p><strong><i class="fa-solid fa-clock me-2 text-muted"></i>Appt Time:</strong> {{ patient.time }}</p>
                    </div>
                </div>

                <!-- Right Column: Symptoms & Prescription Form -->
                <div class="col-md-8 ps-md-4">
                    <h3 class="mb-4">Clinical Assessment</h3>
                    
                    <div class="mb-4">
                        <h5><i class="fa-solid fa-notes-medical me-2 text-danger"></i>Reported Symptoms</h5>
                        <div class="alert alert-danger bg-danger-subtle text-danger-emphasis border-0 mt-2">
                            {{ patient.symptoms }}
                        </div>
                    </div>

                    <hr class="my-4">

                    <!-- Prescription Section -->
                    <h5><i class="fa-solid fa-prescription-bottle-medical me-2 text-success"></i>Issue Medical Prescription</h5>
                    <form action="/prescribe/{{ patient.id }}" method="POST" class="mt-3">
                        <div class="mb-3">
                            <label for="prescription" class="form-label fw-semibold">Medications & Dosage Instructions</label>
                            <textarea class="form-control" id="prescription" name="prescription" rows="4" placeholder="e.g., Paracetamol 500mg - 1 tablet twice a day after meals for 5 days." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-success px-4 py-2">
                            <i class="fa-solid fa-paper-plane me-2"></i>Submit & Complete Visit
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
