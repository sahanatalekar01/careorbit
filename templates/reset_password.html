<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password - CareOrbit</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset_password.css') }}">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}


body {

    min-height: 100vh;

    display: flex;

    justify-content: center;

    align-items: center;

    background: #f4f9ff;

}


.reset-container {

    width: 380px;

    background: white;

    padding: 35px;

    border-radius: 15px;

    text-align: center;

    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.15);

}


/* CareOrbit Logo */

.reset-container h2 {

    color: #007bff;

    font-size: 32px;

    font-weight: 700;

    margin-bottom: 20px;

}


.reset-container h2 span {

    color: #00b894;

}


/* Heading */

.reset-container h3 {

    color: #333;

    font-size: 22px;

    margin-bottom: 12px;

}


/* Paragraph */

.reset-container p {

    color: #666;

    font-size: 14px;

    margin-bottom: 25px;

}



/* Input */

.input-box input {

    width: 100%;

    height: 45px;

    padding: 10px 15px;

    margin-bottom: 15px;

    border: 1px solid #ccc;

    border-radius: 8px;

    outline: none;

}


.input-box input:focus {

    border-color: #007bff;

}


/* Button */

button {

    width: 100%;

    height: 45px;

    margin-top: 10px;

    border: none;

    border-radius: 8px;

    background: #007bff;

    color: white;

    font-size: 16px;

    font-weight: 600;

    cursor: pointer;

}


button:hover {

    background: #0056b3;

}


/* Back link */

.back-section {

    margin-top: 20px;

}


.back-section a {

    text-decoration: none;

    color: #007bff;

    font-size: 14px;

    font-weight: 600;

}
    </style>

</head>

<body>

<div class="reset-container">

    <h2>Care<span>Orbit</span></h2>

    <h3>Create New Password</h3>

    <p>
        Enter your new password to secure your account.
    </p>


    <form method="POST" action="/reset-password">


        <div class="input-box">

            <input 
                type="password"
                name="new_password"
                placeholder="Enter New Password"
                required>

        </div>


        <div class="input-box">

            <input 
                type="password"
                name="confirm_password"
                placeholder="Confirm New Password"
                required>

        </div>


        <button type="submit">
            Reset Password
        </button>


    </form>


    <div class="back-section">

        <a href="/doctor-login">
            ← Back to Login
        </a>

    </div>


</div>


</body>

</html>
