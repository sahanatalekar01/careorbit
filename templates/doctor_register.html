<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareOrbit - Doctor Register</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1063e5 0%, #083380 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            padding: 40px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        .btn-register {
            background: #1063e5;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            border: none;
        }

        .btn-register:hover {
            background: #0d4bb3;
        }
    </style>
</head>

<body>

<div class="register-card">

    <div class="text-center">
        <div class="text-primary fs-1">
            <i class="fa-solid fa-house-medical"></i>
        </div>

        <h3 class="fw-bold mt-2">Create Doctor Account</h3>
        <p class="text-muted">Fill in the details below to create your careorbit doctor account</p>
    </div>

   <form action="/doctor-register" method="POST">

    <div class="mb-3">
    <label>Full Name</label>
    <input type="text" name="full_name" class="form-control" placeholder="Enter Full Name" required>
</div>

<div class="mb-3">
    <label>Username</label>
    <input type="text" name="username" class="form-control" placeholder="Enter Username" required>
</div>

<div class="mb-3">
    <label>Email</label>
    <input type="email" name="email" class="form-control" placeholder="Enter Email" required>
</div>

<div class="mb-3">
    <label>Password</label>

    <div class="input-group">
        <input type="password"
               id="password"
               name="password"
               class="form-control"
               placeholder="Enter password"
               required>

        <span class="input-group-text"
              onclick="togglePassword('password', this)">
            <i class="fa-solid fa-eye"></i>
        </span>
    </div>
</div>


<div class="mb-3">
    <label>Confirm Password</label>

    <div class="input-group">
        <input type="password"
               id="confirm_password"
               name="confirm_password"
               class="form-control"
               placeholder="Confirm password"
               required>

        <span class="input-group-text"
              onclick="togglePassword('confirm_password', this)">
            <i class="fa-solid fa-eye"></i>
        </span>
    </div>
</div>

<button type="submit" class="btn btn-register w-100">Register</button>
</form>
    <hr>

<div class="text-center">
    <p class="small">
        Already have an account?
        <a href="/doctor-login" class="text-decoration-none fw-bold">
             Login
        </a>
    </p>
</div>
    <a href="/" class="text-decoration-none text-muted small">
        <i class="fa-solid fa-arrow-left me-1"></i> Back to Main Site
    </a>
</div>

</div>
<script>
function togglePassword(id, icon) {
    const passwordField = document.getElementById(id);
    const eyeIcon = icon.querySelector("i");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}
</script>
<script
 src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>

</body>
</html>
