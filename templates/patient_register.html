<form method="POST" action="/patient-register">

    <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input
            type="text"
            name="full_name"
            class="form-control"
            placeholder="Enter your full name"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Age</label>
        <input
            type="number"
            name="age"
            class="form-control"
            placeholder="Enter your age"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Gender</label>
        <select
            name="gender"
            class="form-select"
            required>

            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input
            type="email"
            name="email"
            class="form-control"
            placeholder="Enter your email"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input
            type="password"
            name="password"
            class="form-control"
            placeholder="Create a password"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone Number</label>
        <input
            type="text"
            name="phone"
            class="form-control"
            placeholder="Enter your phone number"
            required>
    </div>

    <div class="mb-3">
        <label class="form-label">Blood Group</label>
        <select
            name="blood_group"
            class="form-select">

            <option value="">Select Blood Group</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>AB+</option>
            <option>AB-</option>
            <option>O+</option>
            <option>O-</option>

        </select>
    </div>

    <div class="mb-3">
        <label class="form-label">Address</label>
        <textarea
            name="address"
            class="form-control"
            rows="3"
            placeholder="Enter your address"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Medical History</label>
        <textarea
            name="medical_history"
            class="form-control"
            rows="3"
            placeholder="Diabetes, Asthma, Allergies, etc."></textarea>
    </div>

    <div class="d-grid">
        <button
            type="submit"
            class="btn btn-primary">
            Register
        </button>
    </div>

</form>
