<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareOrbit | AI Symptom Analysis</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            background:#eef5ff;
        }

        .hero{
            padding:60px 0;
        }

        .analysis-card{

            background:white;

            border-radius:20px;

            padding:40px;

            box-shadow:0 15px 40px rgba(0,0,0,.08);

        }

        .title-icon{

            width:80px;
            height:80px;

            border-radius:50%;

            display:flex;
            justify-content:center;
            align-items:center;

            background:linear-gradient(135deg,#0d6efd,#3d8bfd);

            color:white;

            font-size:34px;

            margin:auto;

        }

        h2{

            font-weight:700;

            color:#0d6efd;

            margin-top:20px;

        }

        .subtitle{

            color:#6c757d;

            margin-bottom:35px;

        }

        label{

            font-weight:600;

            margin-bottom:8px;

        }

        textarea{

            resize:none;

            min-height:170px;

            border-radius:12px !important;

        }

        input[type=file]{

            border-radius:12px !important;

        }

        .btn-analyze{

            background:#0d6efd;

            color:white;

            border:none;

            border-radius:50px;

            padding:14px;

            font-size:17px;

            font-weight:600;

            transition:.3s;

        }

        .btn-analyze:hover{

            background:#084298;

            transform:translateY(-2px);

        }

        .result-card{

            display:none;

            margin-top:35px;

            border-left:6px solid #0d6efd;

            background:#f8fbff;

            border-radius:15px;

            padding:25px;

        }

        .error-card{

            display:none;

            margin-top:35px;

            border-left:6px solid red;

            background:#fff5f5;

            border-radius:15px;

            padding:25px;

        }

        .risk{

            font-size:22px;

            font-weight:700;

            margin:15px 0;

        }

        .recommendation{

            line-height:1.8;

            color:#444;

        }

    </style>

</head>

<body>

<section class="hero">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-8">

<div class="analysis-card">

<div class="text-center">

<div class="title-icon">

<i class="bi bi-cpu-fill"></i>

</div>

<h2>AI Symptom Analysis</h2>

<p class="subtitle">

Describe your symptoms below. Our AI will generate a preliminary health assessment based on the information you provide.

</p>

</div>

<form id="symptom-form" enctype="multipart/form-data">

<div class="mb-4">

<label class="form-label">

Symptoms

</label>

<textarea

class="form-control"

id="symptoms"

name="symptoms"

placeholder="Example: Fever since yesterday, headache, body pain..."

required>

</textarea>

</div>

<div class="mb-4">

<label class="form-label">

Upload Image (Optional)

</label>

<input

type="file"

class="form-control"

id="image"

name="image"

accept="image/*">

</div>

<div class="d-grid">

<button

type="submit"

id="submit-btn"

class="btn-analyze">

<i class="bi bi-search-heart-fill"></i>

Analyze Symptoms

</button>

</div>

<!-- RESULT -->

<div id="result-section" class="result-card">

<h4 class="mb-3">

🩺 AI Analysis Result

</h4>

<p id="analysis-text" class="recommendation"></p>

<p id="upload-info" class="text-muted mt-3"></p>

</div>

<!-- ERROR -->

<div id="error-section" class="error-card">

<h4 class="text-danger">

Error

</h4>

<p id="error-text"></p>

</div>

</form>
<script>
document.getElementById("symptom-form").addEventListener("submit", async function(e){

    e.preventDefault();

    const submitBtn = document.getElementById("submit-btn");

    const resultSection = document.getElementById("result-section");
    const errorSection = document.getElementById("error-section");

    const analysisText = document.getElementById("analysis-text");
    const uploadInfo = document.getElementById("upload-info");
    const errorText = document.getElementById("error-text");

    resultSection.style.display = "none";
    errorSection.style.display = "none";

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="bi bi-arrow-repeat"></i> Analyzing...';

    const formData = new FormData(this);

    try{

        const response = await fetch("/analyze",{

            method:"POST",
            body:formData

        });

        const data = await response.json();

        if(response.ok && data.status==="success"){

            let badgeColor = "#198754";

            if(data.risk==="Moderate")
                badgeColor="#ffc107";

            if(data.risk==="High")
                badgeColor="#dc3545";

            analysisText.innerHTML = `
                <div style="margin-bottom:15px;">
                    <span style="
                        background:${badgeColor};
                        color:white;
                        padding:8px 18px;
                        border-radius:30px;
                        font-weight:600;">
                        Risk Level : ${data.risk}
                    </span>
                </div>

                <strong>Recommendation</strong>

                <br><br>

                ${data.recommendation}
            `;

            if(data.uploaded_image){

                uploadInfo.innerHTML =
                `<i class="bi bi-image-fill"></i>
                Uploaded Image :
                ${data.uploaded_image}`;

            }else{

                uploadInfo.innerHTML =
                `<i class="bi bi-image"></i>
                No image uploaded.`;

            }

            resultSection.style.display="block";

        }else{

            errorText.textContent =
            data.message || "Unable to analyze symptoms.";

            errorSection.style.display="block";

        }

    }
    catch(error){

        errorText.textContent =
        "Network error. Please try again.";

        errorSection.style.display="block";

        console.error(error);

    }
    finally{

        submitBtn.disabled=false;

        submitBtn.innerHTML=
        '<i class="bi bi-search-heart-fill"></i> Analyze Symptoms';

    }

});
</script>

</div>

</div>

</div>

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
