<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Audit Logs - CareOrbit</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #0d6efd; color: white; }
        .sidebar a { color: white; text-decoration: none; padding: 10px; display: block; }
        .sidebar a:hover { background-color: #0a58ca; }
        .content-card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <h4>CareOrbit</h4>
            <hr>
            <a href="/admin-dashboard"><i class="fas fa-gauge"></i> Dashboard</a>
            <a href="/audit-logs" class="active bg-primary"><i class="fas fa-shield-halved"></i> Audit Logs</a>
        </div>

        <!-- Main Content -->
        <div class="col-md-10 p-5">
            <div class="content-card">
                <h1><i class="fas fa-shield-halved text-primary"></i> Global Audit Trails</h1>
                <p class="text-muted">Reviewing all system access and security events.</p>
                <hr>
                
                <table class="table table-hover mt-4">
                    <thead class="table-light">
                        <tr>
                            <th>Timestamp</th>
                            <th>Admin User</th>
                            <th>Event Scope</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>2026-07-19 17:05</td>
                            <td>System Admin</td>
                            <td>Node Update</td>
                            <td><span class="badge bg-success">Success</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
