<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}


body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f4f9ff;
}


/* Main Card */

.forgot-container {

    width: 380px;

    background: white;

    padding: 35px;

    border-radius: 15px;

    text-align: center;

    box-shadow: 0 10px 25px rgba(0, 123, 255, 0.15);

}


/* CareOrbit Logo */

.forgot-container h2 {

    color: #007bff;

    font-size: 32px;

    font-weight: 700;

    margin-bottom: 20px;

}


.forgot-container h2 span {

    color: #00b894;

}


/* Heading */

.forgot-container h3 {

    color: #333;

    font-size: 22px;

    margin-bottom: 15px;

}


/* Message */

.forgot-container p {

    color: #666;

    font-size: 14px;

    line-height: 1.6;

    margin-bottom: 25px;

}


/* Back Login Button */

.back-login {

    display: inline-block;

    padding: 12px 25px;

    background: #007bff;

    color: white;

    text-decoration: none;

    border-radius: 8px;

    font-size: 14px;

    font-weight: 600;

}


.back-login:hover {

    background: #0056b3;

}
    </style>
</head>

<body>

<div class="forgot-container">

    <h2>Care<span>Orbit</span></h2>

    <h3>Request Submitted</h3>

    <p>
        Your password reset request has been submitted successfully.
    </p>

    <a href="/doctor-login" class="back-login">
        ← Back to Login
    </a>

</div>

</body>
</html>
