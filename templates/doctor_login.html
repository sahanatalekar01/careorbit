<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareOrbit - Doctor Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1063e5 0%, #083380 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(16, 99, 229, 0.15);
            border-color: #1063e5;
        }
        .btn-login {
            background: #1063e5;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #0d4bb3;
            transform: translateY(-1px);
        }
        .alert-success {
            background-color: #d1e7dd;
            color: #0f5132;
            border: 1px solid #badbcc;
            border-radius: 10px;
            padding: 12px 15px;
            margin-bottom: 20px;
            font-weight: 500;
            text-align: center;
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <!-- Brand Logo -->
    <div class="text-primary fs-1 mb-2">
        <i class="fa-solid fa-house-medical"></i>
    </div>
    <h3 class="fw-bold text-dark mb-1">CareOrbit Portal</h3>
    <p class="text-muted small mb-4">Doctor & Medical Staff Authentication</p>

    <!-- Login Form -->

<!-- Flash Message Logic -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-success">
        <i class="fa-solid fa-circle-check me-2"></i>
      {{ messages[0] }}
    </div>
  {% endif %}
{% endwith %}
<form action="/doctor-login" method="POST">

    <div class="mb-3 text-start">
        <label class="form-label">Username or Email</label>
        <input type="text"
               name="login"
               class="form-control"
               placeholder="Enter username or email"
               required>
    </div>

    <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <div class="input-group">
    <input type="password"
           id="password"
           name="password"
           class="form-control"
           placeholder="Enter password"
           required>

    <span class="input-group-text"
          onclick="togglePassword('password', this)">
        <i class="fa-solid fa-eye"></i>
    </span>
</div>
    </div>

    <button type="submit" class="btn btn-login w-100">
        <i class="fa-solid fa-right-to-bracket me-2"></i>
        Login
    </button>
</form>

<div class="mt-3">
    <a href="/forgot-password" class="text-decoration-none small">
        Forgot Password?
    </a>
</div>

<div class="mt-2">
    <span class="small text-muted">Don't have an account?</span>
    <a href="/doctor-register" class="text-decoration-none fw-semibold">
        Register
    </a>
</div>

<hr>

<a href="/" class="text-decoration-none small text-muted">
    <i class="fa-solid fa-arrow-left me-1"></i> Back to Main Site
</a>
</div>
<script>
function togglePassword(id, icon) {
    const passwordField = document.getElementById(id);
    const eyeIcon = icon.querySelector("i");

    if (passwordField.type === "password") {
        passwordField.type = "text";
        eyeIcon.classList.remove("fa-eye");
        eyeIcon.classList.add("fa-eye-slash");
    } else {
        passwordField.type = "password";
        eyeIcon.classList.remove("fa-eye-slash");
        eyeIcon.classList.add("fa-eye");
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
