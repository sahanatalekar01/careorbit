<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareOrbit - Doctor Login</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1063e5 0%, #083380 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 20px;
            background: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            box-shadow: 0 0 0 0.25rem rgba(16, 99, 229, 0.15);
            border-color: #1063e5;
        }
        .btn-login {
            background: #1063e5;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-login:hover {
            background: #0d4bb3;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="login-card text-center">
    <!-- Brand Logo -->
    <div class="text-primary fs-1 mb-2">
        <i class="fa-solid fa-house-medical"></i>
    </div>
    <h3 class="fw-bold text-dark mb-1">CareOrbit Portal</h3>
    <p class="text-muted small mb-4">Doctor & Medical Staff Authentication</p>

    <!-- Login Form -->
    <form action="/doctor-login" method="POST">
        <div class="mb-3 text-start">
            <label class="form-label fw-semibold small text-secondary">Email Address</label>
            <input type="email" name="email" class="form-control" placeholder="doctor@careorbit.com" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label fw-semibold small text-secondary">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-login w-100 shadow-sm mb-3">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Access Dashboard
        </button>
    </form>
    
    <a href="/" class="text-decoration-none small text-muted"><i class="fa-solid fa-arrow-left me-1"></i> Back to main site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
